# devbox — reference Fly.io deployment template.
#
# Copy this file, rename the app, and deploy:
#   flyctl deploy . --app <your-app> --dockerfile docker/Dockerfile
#
# The image is universal: no per-consumer customization. Secrets are injected
# at runtime via `fly secrets set`. See docker/README.md for the full
# setup including GitHub identity and SSH signing.

app = 'devbox'
primary_region = 'lax'

[build]
  dockerfile = 'docker/Dockerfile'

[[mounts]]
  source = 'devbox_data'
  destination = '/data'

# sshd on :2222. Fly's built-in SSH proxy (hallpass) occupies :22.
# The service maps external :22 → internal :2222 so consumers connect
# to <app>.internal:22 (or the public hostname:22 if exposed).
[[services]]
  protocol = 'tcp'
  internal_port = 2222
  auto_start_machines = false

  [[services.ports]]
    port = 22

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
